<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{Subject}}</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; line-height: 1.6;">
    <table width="100%" border="0" cellpadding="0" cellspacing="0">
        <tr>
            <td style="padding: 20px 0; background-color: #f9f9f9;" align="center">
                <table width="600" border="0" cellpadding="0" cellspacing="0" style="width: 100%; max-width: 600px; background-color: #ffffff; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                    <tr>
                        <td style="padding: 30px; background-color: #4a5568; color: #ffffff; border-top-left-radius: 8px; border-top-right-radius: 8px;" align="center">
                            <h1 style="margin: 0; font-size: 24px;">Notification from the event: {{EventName}}</h1>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding: 40px 30px;">
                            <h2 style="margin: 0 0 20px 0; font-size: 20px; color: #2d3748;">Hello,</h2>
                            <div style="font-size: 16px; color: #4a5568; white-space: pre-wrap;">{{CustomMessage}}</div>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding: 0 30px 30px 30px;">
                            <table width="100%" border="0" cellpadding="0" cellspacing="0" style="border-top: 1px solid #e2e8f0; padding-top: 20px;">
                                <tr>
                                    <td style="font-size: 14px; color: #718096;">
                                        <strong>Time:</strong> {{EventDate}}<br>
                                        <strong>Place:</strong> {{EventLocation}}
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding: 20px 30px; background-color: #edf2f7; color: #a0aec0; font-size: 12px; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px;" align="center">
                            <p style="margin: 0;">© 2025 Music Event System. All rights reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
